# Prompt Codec — local config (v2 / Rust)
# Local model encodes; paid API only sees compressed prompts.

local:
  base_url: "http://127.0.0.1:11434/v1"
  api_key: "ollama"
  # Gemma 4 (released 2026-04) — 12b-mlx: 7.7GB, 256K context, MLX-optimized;
  # Ollama 0.31+ multi-token prediction makes it fast on Apple Silicon.
  # Lighter: qwen3.5:4b-mlx (4GB). Stronger: gemma4:26b-mlx (18GB, MoE, 3.8B active).
  model: "gemma4:12b-mlx"
  temperature: 0.1
  max_tokens: 2048
  # Gemma 4 is a thinking model: without this it spends the whole output
  # budget on hidden reasoning and every compression fails as truncated.
  # Set to "" if your server (some MLX/Exo builds) rejects the field.
  reasoning_effort: "none"

encoder:
  # rules = free, no model | local = LLM rewrite | hybrid = both (recommended)
  mode: hybrid
  target_ratio: 0.45
  protect_system_under_chars: 800
  min_chars_to_compress: 400
  rules_enabled: true
  # Which messages are eligible to CALL the local model on a cache miss:
  # last_user (default, keeps resent history byte-stable for upstream prompt
  # caching) | all | none (rules only, even in local/hybrid mode).
  llm_scope: last_user
  # Hard per-call timeout for the local model, in seconds.
  llm_timeout_s: 15

proxy:
  host: "127.0.0.1"
  port: 8787
  # Change to your paid provider OpenAI-compatible base
  upstream_base_url: "https://api.x.ai/v1"
  upstream_api_key_env: "X_API_KEY"
  pass_client_auth: true
  log_stats: true

stats:
  usd_per_mtok_input: 3.0
